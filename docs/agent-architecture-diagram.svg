<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#0f172a" /></marker></defs><rect width="1400" height="920" fill="#f8fafc"/><rect x="42" y="34" width="1316" height="76" rx="18" fill="#0f172a"/><text x="78" y="68" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700" text-anchor="start"><tspan x="78" dy="0">GenAi Agent Architecture</tspan></text><text x="78" y="100" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" text-anchor="start"><tspan x="78" dy="0">A 1-2 page system view of agent roles, communication, tool integrations, and failure handling</tspan></text><rect x="42" y="132" width="1316" height="74" rx="18" fill="#eff6ff" stroke="#bfdbfe"/><text x="68" y="160" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="400" text-anchor="start"><tspan x="68" dy="0">GenAi behaves like a focused multi-agent healthcare assistant behind one chat interface. The frontend orchestrat</tspan><tspan x="68" dy="22">es requests, the backend routes them to specialist agents, and each agent can call local tools or external providers while degrading safely when a dependency fails.</tspan></text><line x1="135.0" y1="80" x2="370.0" y2="150" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="495" y1="111.0" x2="540" y2="111.0" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="655.0" y1="150" x2="180.0" y2="235" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="655.0" y1="150" x2="405.0" y2="235" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="655.0" y1="150" x2="655.0" y2="235" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="655.0" y1="150" x2="430.0" y2="340" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="180.0" y1="313" x2="160.0" y2="490" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="180.0" y1="313" x2="415.0" y2="490" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="405.0" y1="313" x2="415.0" y2="490" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="655.0" y1="313" x2="415.0" y2="490" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="430.0" y1="418" x2="680.0" y2="490" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="180.0" y1="313" x2="425.0" y2="620" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="430.0" y1="418" x2="425.0" y2="620" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="655.0" y1="150" x2="425.0" y2="620" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrow)"/><rect x="70" y="80" width="130" height="62" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2.4"/><text x="135.0" y="108" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle"><tspan x="135.0" dy="0">User</tspan></text><text x="135.0" y="132" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="middle"><tspan x="135.0" dy="0">Voice or text</tspan><tspan x="135.0" dy="22">input</tspan></text><rect x="245" y="72" width="250" height="78" rx="18" fill="#0f172a" stroke="#38bdf8" stroke-width="2.4"/><text x="261" y="100" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="261" dy="0">Frontend Orchestrator</tspan></text><text x="261" y="124" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="261" dy="0">WorkspacePage + Messages + api.js</tspan></text><rect x="540" y="72" width="230" height="78" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/><text x="556" y="100" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="556" dy="0">Backend HTTP Shell</tspan></text><text x="556" y="124" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="556" dy="0">AppHandler + api_router</tspan></text><rect x="80" y="235" width="200" height="78" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/><text x="96" y="263" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="96" dy="0">Symptom Analysis Agent</tspan></text><text x="96" y="287" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="96" dy="0">triage_controller -&gt;</tspan><tspan x="96" dy="22">triage_service</tspan></text><rect x="305" y="235" width="200" height="78" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/><text x="321" y="263" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="321" dy="0">Facility Finder Agent</tspan></text><text x="321" y="287" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="321" dy="0">hospital_search + hospital</tspan><tspan x="321" dy="22">ranking</tspan></text><rect x="530" y="235" width="250" height="78" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/><text x="546" y="263" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="546" dy="0">Prescription Explainer Agent</tspan></text><text x="546" y="287" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="546" dy="0">prescription_controller -&gt;</tspan><tspan x="546" dy="22">prescription_service</tspan></text><rect x="305" y="340" width="250" height="78" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.4"/><text x="321" y="368" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="321" dy="0">Medical Book Agent</tspan></text><text x="321" y="392" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="321" dy="0">books_controller -&gt; book_service</tspan></text><rect x="50" y="490" width="220" height="72" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2.4"/><text x="66" y="518" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="66" dy="0">LLM Tool</tspan></text><text x="66" y="542" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="66" dy="0">OpenAI or Groq via</tspan><tspan x="66" dy="22">llm_triage_service</tspan></text><rect x="290" y="490" width="250" height="72" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.4"/><text x="306" y="518" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="306" dy="0">Static Knowledge Tools</tspan></text><text x="306" y="542" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="306" dy="0">domain_data + localization_service</tspan></text><rect x="560" y="490" width="240" height="72" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2.4"/><text x="576" y="518" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="576" dy="0">File + Session Tools</tspan></text><text x="576" y="542" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="576" dy="0">PDF or DOCX parsing + localStorage +</tspan><tspan x="576" dy="22">in-memory books</tspan></text><rect x="215" y="620" width="420" height="74" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2.4"/><text x="231" y="648" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="start"><tspan x="231" dy="0">Fallback and Error Layer</tspan></text><text x="231" y="672" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="400" text-anchor="start"><tspan x="231" dy="0">400 or 404 handling + rule-based fallback + safe defaults</tspan></text><rect x="42" y="786" width="1316" height="96" rx="18" fill="#ffffff" stroke="#cbd5e1"/><text x="66" y="820" fill="#0f172a" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700" text-anchor="start"><tspan x="66" dy="0">Design note</tspan></text><text x="66" y="850" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" text-anchor="start"><tspan x="66" dy="0">The frontend is the orchestration hub, backend services behave like specialist agents,</tspan><tspan x="66" dy="22">and every critical path has a safe fallback so the user still gets a structured answer.</tspan></text></svg>